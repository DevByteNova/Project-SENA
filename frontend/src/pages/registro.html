<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Pijamas</title>
    <link rel="stylesheet" href="../../../styles2.css">
    <style>
        .registro-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .registro-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }

        .registro-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .registro-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .registro-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .password-info {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
        }

        .password-info ul {
            margin: 5px 0 0 20px;
            padding: 0;
        }

        .password-info li {
            margin: 3px 0;
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #c3e6cb;
        }

        .success-message.show {
            display: block;
        }

        .registro-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .registro-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .registro-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .tipo-usuario-info {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #856404;
        }

        @media (max-width: 600px) {
            .registro-box {
                padding: 30px 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .registro-header h1 {
                font-size: 24px;
            }
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #333;
            font-size: 14px;
        }

        .checkbox-label input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
            cursor: pointer;
        }

        .checkbox-label span {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="registro-container">
        <div class="registro-box">
            <div class="registro-header">
                <h1>Crear Cuenta</h1>
                <p>Únete a nuestra plataforma de pijamas</p>
            </div>

            <div class="success-message" id="successMessage"></div>

            <form id="registroForm">
                <div class="form-group">
                    <label for="tipoUsuario">Tipo de Cuenta</label>
                    <select id="tipoUsuario" name="tipoUsuario" required>
                        <option value="">Selecciona un tipo</option>
                        <option value="cliente">Cliente</option>
                        <option value="vendedor">Vendedor</option>
                    </select>
                    <div class="tipo-usuario-info" id="tipoUsuarioInfo" style="display: none;"></div>
                </div>

                <div class="form-group">
                    <label for="usuario">Nombre de Usuario</label>
                    <input
                        type="text"
                        id="usuario"
                        name="usuario"
                        placeholder="Tu nombre de usuario"
                        required
                    >
                    <div class="error-message" id="errorUsuario"></div>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="tu@email.com"
                        required
                    >
                    <div class="error-message" id="errorEmail"></div>
                </div>

                <div class="password-info">
                    <strong>Requisitos de contraseña:</strong>
                    <ul>
                        <li id="reqLength">Al menos 6 caracteres</li>
                    </ul>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            required
                        >
                        <div class="error-message" id="errorPassword"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Contraseña</label>
                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            placeholder="••••••••"
                            required
                        >
                        <div class="error-message" id="errorConfirmPassword"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terminos" name="terminos" required>
                        <span>Acepto los términos y condiciones</span>
                    </label>
                    <div class="error-message" id="errorTerminos"></div>
                </div>

                <button type="submit" class="registro-button" id="registroBtn">
                    Crear Cuenta
                </button>
            </form>

            <div class="login-link">
                ¿Ya tienes cuenta? <a href="../../../index.html">Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <script src="registro.js"></script>
</body>
</html>
